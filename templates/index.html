<!doctype html>
<html lang="en" class="h-full">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>What IF — Component Preflight</title>
    <script>
      window.tailwind = { config: { darkMode: 'class' } };
    </script>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2pdf.js/0.9.3/html2pdf.bundle.min.js" integrity="sha512-YcsIPyzLA+Iao1E22OLbKcFiqnx91oAwZqvBoH2dNh3DGZ0fZsjbV6o9JrJX2kCj2ksQJ9c0L2SYvW90jaG3xg==" crossorigin="anonymous" referrerpolicy="no-referrer"></script>
  </head>
  <body class="h-full bg-gray-50 text-gray-900 selection:bg-indigo-200">
    <div class="min-h-screen grid grid-cols-1 md:grid-cols-[260px_1fr]">
      <!-- Sidebar -->
      <aside class="border-b md:border-b-0 md:border-r border-gray-200 bg-white p-4 md:p-6 space-y-4">
        <div class="flex items-center justify-between">
          <div class="text-xl font-bold">What <span class="text-indigo-600">IF</span></div>
          <button id="toggleTheme" class="text-xs text-gray-500 hover:text-gray-900" title="Toggle theme">Theme</button>
        </div>

        <nav class="space-y-2">
          <button id="newPromptBtn" class="w-full text-left px-3 py-2 rounded-md hover:bg-gray-100">New Prompt</button>
          <button id="savedBtn" class="w-full text-left px-3 py-2 rounded-md hover:bg-gray-100">Saved</button>
          <button id="settingsBtn" class="w-full text-left px-3 py-2 rounded-md hover:bg-gray-100">Settings</button>
        </nav>

        <section id="savedPanel" class="hidden border-t pt-3 space-y-2 max-h-[40vh] overflow-auto">
          <div class="text-xs uppercase tracking-wide text-gray-500">Saved Analyses</div>
          <div id="savedList" class="space-y-2"></div>
        </section>

        <section id="settingsPanel" class="hidden border-t pt-3 space-y-3">
          <div class="text-xs uppercase tracking-wide text-gray-500">Settings</div>
          <label class="flex items-center gap-2 text-sm">
            <input id="settingIncludeTimestamp" type="checkbox" class="rounded border-gray-300" checked>
            Include timestamp in PDF
          </label>
        </section>
      </aside>

      <!-- Main -->
      <main class="p-4 md:p-8">
        <div class="max-w-4xl mx-auto space-y-6">
          <!-- Input -->
          <div class="bg-white border border-gray-200 rounded-lg p-4 md:p-6 shadow-sm">
            <label for="componentInput" class="block text-sm font-medium text-gray-700">Component</label>
            <div class="mt-2 flex flex-col sm:flex-row gap-3">
              <input id="componentInput" class="flex-1 rounded-md border-gray-300 focus:border-indigo-500 focus:ring-indigo-500" placeholder="Enter a UI component like Login Page" />
              <button id="runBtn" class="inline-flex items-center justify-center rounded-md bg-indigo-600 px-4 py-2 text-white font-medium hover:bg-indigo-700 disabled:opacity-50">Run Analysis</button>
            </div>
          </div>

          <!-- Actions -->
          <div class="flex items-center justify-between">
            <div class="text-sm text-gray-600">Results appear below. Save occurs automatically.</div>
            <button id="exportBtn" class="inline-flex items-center justify-center rounded-md bg-gray-900 px-4 py-2 text-white font-medium hover:bg-black disabled:opacity-50" disabled>Export PDF</button>
          </div>

          <!-- Results -->
          <section id="resultsWrapper" class="space-y-4">
            <div id="metaBar" class="hidden text-sm text-gray-600"></div>

            <div id="cards" class="grid grid-cols-1 lg:grid-cols-2 gap-4"></div>
          </section>
        </div>
      </main>
    </div>

    <!-- Loading overlay -->
    <div id="loading" class="hidden fixed inset-0 bg-black/20 backdrop-blur-sm flex items-center justify-center z-50">
      <div class="flex items-center gap-3 bg-white rounded-md px-4 py-3 shadow">
        <svg class="h-5 w-5 animate-spin text-indigo-600" viewBox="0 0 24 24">
          <circle class="opacity-25" cx="12" cy="12" r="10" stroke="currentColor" stroke-width="4" fill="none"></circle>
          <path class="opacity-75" fill="currentColor" d="M4 12a8 8 0 018-8v4a4 4 0 00-4 4H4z"></path>
        </svg>
        <div class="text-sm font-medium">Analyzing…</div>
      </div>
    </div>

    <script>
      const el = {
        componentInput: document.getElementById('componentInput'),
        runBtn: document.getElementById('runBtn'),
        exportBtn: document.getElementById('exportBtn'),
        cards: document.getElementById('cards'),
        metaBar: document.getElementById('metaBar'),
        loading: document.getElementById('loading'),
        newPromptBtn: document.getElementById('newPromptBtn'),
        savedBtn: document.getElementById('savedBtn'),
        settingsBtn: document.getElementById('settingsBtn'),
        savedPanel: document.getElementById('savedPanel'),
        settingsPanel: document.getElementById('settingsPanel'),
        savedList: document.getElementById('savedList'),
        toggleTheme: document.getElementById('toggleTheme'),
        settingIncludeTimestamp: document.getElementById('settingIncludeTimestamp')
      };

      const STORAGE_KEY = 'whatif:savedAnalyses:v1';

      function setLoading(v) { el.loading.classList.toggle('hidden', !v); }

      function saveAnalysis(rec) {
        const list = JSON.parse(localStorage.getItem(STORAGE_KEY) || '[]');
        list.unshift(rec);
        localStorage.setItem(STORAGE_KEY, JSON.stringify(list.slice(0, 50)));
        renderSaved();
      }

      function renderSaved() {
        const list = JSON.parse(localStorage.getItem(STORAGE_KEY) || '[]');
        el.savedList.innerHTML = '';
        if (!list.length) {
          const empty = document.createElement('div');
          empty.className = 'text-xs text-gray-500';
          empty.textContent = 'No saved analyses yet.';
          el.savedList.appendChild(empty);
          return;
        }
        list.forEach((item, idx) => {
          const b = document.createElement('button');
          b.className = 'w-full text-left px-3 py-2 rounded-md bg-gray-50 hover:bg-gray-100 border border-gray-200';
          const ts = new Date(item.generatedAt || item.savedAt || Date.now()).toLocaleString();
          b.innerHTML = `<div class="font-medium">${item.component}</div><div class="text-xs text-gray-500">${ts}</div>`;
          b.addEventListener('click', () => {
            populateResults(item);
          });
          el.savedList.appendChild(b);
        });
      }

      function card(title, items) {
        const wrapper = document.createElement('div');
        wrapper.className = 'bg-white border border-gray-200 rounded-lg p-4 shadow-sm';
        const h = document.createElement('div');
        h.className = 'mb-2 font-semibold text-gray-800';
        h.textContent = title;
        const ul = document.createElement('ul');
        ul.className = 'list-disc pl-5 space-y-1 text-gray-700';
        items.forEach(t => {
          const li = document.createElement('li');
          li.textContent = t;
          ul.appendChild(li);
        });
        wrapper.appendChild(h);
        wrapper.appendChild(ul);
        return wrapper;
      }

      function populateResults(data) {
        el.cards.innerHTML = '';
        const { keyPoints = [], whatIfs = [], suggestions = [], checklist = [], generatedAt, component } = data || {};
        if (component) {
          const tsText = new Date(generatedAt || Date.now()).toLocaleString();
          el.metaBar.classList.remove('hidden');
          el.metaBar.textContent = `${component} • Generated ${tsText}`;
        }
        el.cards.appendChild(card('Key Points', keyPoints));
        el.cards.appendChild(card('What-If Scenarios', whatIfs));
        el.cards.appendChild(card('Suggestions to Prevent Issues', suggestions));
        el.cards.appendChild(card('Developer Checklist', checklist));
        el.exportBtn.disabled = false;
      }

      async function runAnalysis() {
        const component = (el.componentInput.value || '').trim();
        if (!component) return;
        setLoading(true);
        el.exportBtn.disabled = true;
        try {
          const res = await fetch('/analyze', {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({ component })
          });
          if (!res.ok) {
            const t = await res.text();
            throw new Error(t || 'Failed to analyze');
          }
          const data = await res.json();
          populateResults(data);
          saveAnalysis(data);
        } catch (e) {
          alert('Error: ' + (e && e.message ? e.message : e));
        } finally {
          setLoading(false);
        }
      }

      function exportPDF() {
        const includeTs = el.settingIncludeTimestamp.checked;
        const wrapper = document.getElementById('resultsWrapper');
        const opt = {
          margin:       0.5,
          filename:     'what-if-analysis.pdf',
          image:        { type: 'jpeg', quality: 0.98 },
          html2canvas:  { scale: 2, letterRendering: true },
          jsPDF:        { unit: 'in', format: 'a4', orientation: 'portrait' }
        };
        if (!includeTs) {
          const old = el.metaBar.textContent;
          el.metaBar.textContent = '';
          html2pdf().set(opt).from(wrapper).save().then(() => {
            el.metaBar.textContent = old;
          });
        } else {
          html2pdf().set(opt).from(wrapper).save();
        }
      }

      function toggle(panel) {
        panel.classList.toggle('hidden');
      }

      el.runBtn.addEventListener('click', runAnalysis);
      el.componentInput.addEventListener('keydown', (e) => { if (e.key === 'Enter') runAnalysis(); });
      el.exportBtn.addEventListener('click', exportPDF);
      el.newPromptBtn.addEventListener('click', () => { el.componentInput.value = ''; el.cards.innerHTML=''; el.metaBar.classList.add('hidden'); el.exportBtn.disabled = true; });
      el.savedBtn.addEventListener('click', () => toggle(el.savedPanel));
      el.settingsBtn.addEventListener('click', () => toggle(el.settingsPanel));

      // Theme toggle
      el.toggleTheme.addEventListener('click', () => {
        document.documentElement.classList.toggle('dark');
      });

      renderSaved();
    </script>
  </body>
</html>
